{% extends 'lheader.html' %}

{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #F5F5E8;
            color: #1A3C34;
            line-height: 1.6;
        }
        
        .hero-wrap {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        
        .hero-wrap .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 60, 52, 0.7);
            z-index: 1;
        }
        
        .ftco-section {
            padding: 100px 0;
        }
        
        .card {
            background: #E8ECE5;
            border-radius: 15px;
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(26, 60, 52, 0.2);
        }
        
        .form-control {
            background: #F5F5E8;
            border: 1px solid #1A3C34;
            padding: 12px;
        }
        
        .btn-primary {
            background: #D4A017;
            color: #1A3C34;
            border: none;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: #1A3C34;
            color: #F5F5E8;
        }
        
        .text-primary {
            color: #D4A017 !important;
        }
        
        .breadcrumb a {
            color: #D4A017;
            text-decoration: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <section class="hero-wrap hero-wrap-2 js-fullheight" style="background-image: url('{% static 'images/bg_3.jpg' %}');" data-stellar-background-ratio="0.5">
    <div class="overlay"></div>
    <div class="container">
      <div class="row no-gutters slider-text js-fullheight align-items-end justify-content-start">
        <div class="col-md-9 ftco-animate pb-5">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent p-0">
              <li class="breadcrumb-item"><a href="{% url 'lindex' %}">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Update Profile</li>
            </ol>
          </nav>
          <h1 class="mb-3 display-4 fw-bold text-white">Update Profile</h1>
        </div>
      </div>
    </div>
  </section>

  {% if msg %}
  <div class="alert alert-danger alert-dismissible fade show" role="alert" style="background: #E8ECE5; border: none; color: #1A3C34;">
    {{msg}}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  {% endif %}

  <section class="ftco-section contact-section py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
          <div class="card shadow-sm">
            <div class="card-body p-5">
              <h4 class="mb-4 text-center" style="color: #1A3C34; font-family: 'Cinzel', serif;">Update Your Profile</h4>
              <form method="post" action="{% url 'uprofilelessor' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                  <div class="col-12">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{user.name}}" placeholder="Enter your name">
                  </div>
                  <div class="col-12">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" value="{{user.email}}" disabled>
                  </div>
                  <div class="col-12">
                    <label for="mobile" class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control form-control-lg" id="mobile" name="mobile" value="{{user.mobile}}" placeholder="Enter your mobile number">
                  </div>
                  <div class="col-12">
                    <label for="profile" class="form-label">Profile Picture</label>
                    <div class="mb-3">
                      <img src="{{user.profile.url}}" class="rounded-circle" height="100" width="100" alt="Profile Picture">
                    </div>
                    <input type="file" class="form-control" id="profile" name="profile" accept="image/*">
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary btn-lg w-100">Update Profile</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
{% endblock %}
