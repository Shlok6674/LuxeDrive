{% extends 'lheader.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Base Styles */
        body {
            font-family: 'Montserrat', sans-serif;
            background: #F5F5E8;
            color: #1A3C34;
            line-height: 1.6;
        }

        /* Hero Section */
        .hero-wrap-2 {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        .overlay {
            background: rgba(26, 60, 52, 0.7);
        }

        .bread {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            color: #D4A017;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        .breadcrumbs {
            color: #F5F5E8;
        }

        /* Form Section */
        .contact-section {
            padding: 80px 0;
        }

        .contact-form {
            max-width: 800px;
            margin: 0 auto;
            background: #E8ECE5;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(26, 60, 52, 0.1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-control {
            background: #F5F5E8;
            border: 2px solid #A3B5A8;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            color: #1A3C34;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #D4A017;
            box-shadow: 0 0 10px rgba(212, 160, 23, 0.2);
        }

        select.form-control {
            cursor: pointer;
        }

        .btn-primary {
            background: #D4A017;
            color: #1A3C34;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #1A3C34;
            color: #F5F5E8;
            transform: translateY(-3px);
        }

        /* Alert Styling */
        .alert-danger {
            background: #fff;
            border-left: 4px solid #D4A017;
            color: #1A3C34;
            padding: 15px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .contact-form {
                padding: 20px;
            }
            
            .bread {
                font-size: 36px;
            }
        }

        /* Form Styling from update.html */
        .card {
            background: #E8ECE5;
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(26, 60, 52, 0.2);
        }
        .form-label {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: #1A3C34;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            background: #F5F5E8;
            border: 1px solid #A3B5A8;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            color: #1A3C34;
        }
        .form-control:focus, .form-select:focus {
            border-color: #D4A017;
            box-shadow: 0 0 5px rgba(212, 160, 23, 0.5);
        }
        .btn-primary {
            background: #D4A017;
            border: none;
            color: #1A3C34;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 500;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .btn-primary:hover {
            background: #1A3C34;
            color: #F5F5E8;
        }
        /* Alert Styling */
        .alert {
            background: #E8ECE5;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            color: #1A3C34;
            border: 1px solid #A3B5A8;
        }
        .alert-danger {
            background: #D4A017;
            color: #1A3C34;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <section class="hero-wrap hero-wrap-2 js-fullheight" style="background-image: url('{% static 'images/bg_3.jpg' %}');" data-stellar-background-ratio="0.5">
        <div class="overlay"></div>
        <div class="container">
            <div class="row no-gutters slider-text js-fullheight align-items-end justify-content-start">
                <div class="col-md-9 ftco-animate pb-5">
                    <p class="breadcrumbs">
                        <span class="mr-2"><a href="index.html">Home <i class="ion-ios-arrow-forward"></i></a></span>
                        <span>Add Cars <i class="ion-ios-arrow-forward"></i></span>
                    </p>
                    <h1 class="mb-3 bread">Add New Car</h1>
                </div>
            </div>
        </div>
    </section>

    <section class="ftco-section contact-section">
        <div class="container">
            {% if msg %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <div class="card">
                <form method="post" action="{% url 'add' %}" class="contact-form" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="stransmission" class="form-label">Transmission</label>
                            <select class="form-select" id="stransmission" name="stransmission" required>
                                <option value="" disabled selected>-------Select Transmission--------</option>
                                <option value="Manual">Manual</option>
                                <option value="Auto">Auto</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="sfuel" class="form-label">Fuel Type</label>
                            <select class="form-select" id="sfuel" name="sfuel" required>
                                <option value="" disabled selected>-------Select Fuel--------</option>
                                <option value="CNG">CNG</option>
                                <option value="Petrol">Petrol</option>
                                <option value="Diesel">Diesel</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="cname" class="form-label">Car Name</label>
                            <input type="text" class="form-control" id="cname" name="cname" placeholder="Enter car name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cprice" class="form-label">Price (per day)</label>
                            <input type="number" class="form-control" id="cprice" name="cprice" placeholder="Enter price" min="0" step="1" required>
                        </div>
                        <div class="col-md-6">
                            <label for="milegae" class="form-label">Mileage (km/l)</label>
                            <input type="number" class="form-control" id="milegae" name="milegae" placeholder="Enter mileage" min="0" step="0.1" required>
                        </div>
                        <div class="col-md-6">
                            <label for="seats" class="form-label">Seating Capacity</label>
                            <input type="number" class="form-control" id="seats" name="seats" placeholder="Enter seating capacity" min="1" max="20" required>
                        </div>
                        <div class="col-md-6">
                            <label for="luggage" class="form-label">Luggage Capacity (liters)</label>
                            <input type="number" class="form-control" id="luggage" name="luggage" placeholder="Enter luggage capacity" min="0" required>
                        </div>
                        <div class="col-12">
                            <label for="desc" class="form-label">Description</label>
                            <textarea class="form-control" id="desc" name="desc" rows="3" placeholder="Enter car description" required></textarea>
                        </div>
                        <div class="col-12">
                            <label for="cimage" class="form-label">Car Image</label>
                            <input type="file" class="form-control" id="cimage" name="cimage" accept="image/*" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Add Car</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script>
        // Form Validation and Interactive Elements
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('.contact-form');
            
            form.addEventListener('submit', (e) => {
                const inputs = form.querySelectorAll('input[required], select[required]');
                let isValid = true;

                inputs.forEach(input => {
                    if (!input.value) {
                        isValid = false;
                        input.style.borderColor = '#dc3545';
                        input.nextElementSibling?.remove();
                        const error = document.createElement('span');
                        error.style.color = '#dc3545';
                        error.style.fontSize = '12px';
                        error.textContent = 'This field is required';
                        input.after(error);
                    } else {
                        input.style.borderColor = '#e9ecef';
                        input.nextElementSibling?.remove();
                    }
                });

                if (!isValid) {
                    e.preventDefault();
                }
            });

            // Real-time input validation
            const inputs = form.querySelectorAll('input, select');
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    if (input.value) {
                        input.style.borderColor = '#28a745';
                        input.nextElementSibling?.remove();
                    }
                });
            });

            // File input preview
            const fileInput = document.querySelector('input[type="file"]');
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const preview = document.createElement('img');
                        preview.src = e.target.result;
                        preview.style.maxWidth = '200px';
                        preview.style.marginTop = '10px';
                        fileInput.after(preview);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

     
    </script>
</body>
</html>
{% endblock %}
