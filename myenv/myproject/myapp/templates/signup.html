{% extends 'header.html' %}
{% load static %}
{% block content %}

<!-- Hide navbar -->
<style>
    nav, .navbar, header { display: none !important; }
</style>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #F5F5E8; /* Light cream */
            color: #1A3C34; /* Deep teal */
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            background-image: url('{% static 'images/bg_3.jpg' %}');
            background-size: cover;
            background-position: center;
        }
        .hero .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Adjusted overlay for contrast */
            z-index: 0;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            color: #D4A017; /* Soft gold */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        .hero-content p {
            color: #F5F5E8; /* Light cream */
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .hero-content .btn-primary {
            background: #D4A017; /* Soft gold */
            border: none;
            color: #1A3C34; /* Deep teal */
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 500;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .hero-content .btn-primary:hover {
            background: #1A3C34; /* Deep teal */
            color: #F5F5E8; /* Light cream */
        }

        /* Breadcrumbs */
        .breadcrumbs {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 20px;
            z-index: 2;
        }
        .breadcrumbs a {
            color: #F5F5E8; /* Light cream */
            text-decoration: none;
            font-size: 16px;
            margin: 0 5px;
            font-family: 'Montserrat', sans-serif;
        }
        .breadcrumbs a:hover {
            color: #D4A017; /* Soft gold */
        }
        .breadcrumbs span {
            color: #A3B5A8; /* Muted teal */
            font-size: 16px;
            margin: 0 5px;
        }

        /* Main Content */
        .ftco-section {
            padding: 100px 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Alerts */
        .alert {
            background: #E8ECE5; /* Slightly darker cream */
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            color: #1A3C34; /* Deep teal */
            border: 1px solid #A3B5A8; /* Muted teal */
        }
        .alert-danger {
            background: #D4A017; /* Soft gold */
            color: #1A3C34;
        }
        .alert .btn-close {
            color: #1A3C34;
            opacity: 0.7;
        }
        .alert .btn-close:hover {
            opacity: 1;
        }

        /* Signup Form */
        .signup-card {
            background: #E8ECE5; /* Slightly darker cream */
            border-radius: 15px;
            padding: 25px;
            max-width: 400px;
            margin: 0 auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .signup-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(26, 60, 52, 0.2);
        }
        .signup-card h3 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #D4A017; /* Soft gold */
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-group {
            width: 100%;
            margin-bottom: 20px;
        }
        .btn-outline-primary {
            border-color: #A3B5A8; /* Muted teal */
            color: #1A3C34; /* Deep teal */
            width: 50%;
            transition: all 0.3s ease;
        }
        .btn-outline-primary:hover, .btn-check:checked + .btn-outline-primary {
            background: #D4A017; /* Soft gold */
            color: #F5F5E8; /* Light cream */
            border-color: #D4A017;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group-text {
            background: #F5F5E8; /* Light cream */
            border: 1px solid #A3B5A8; /* Muted teal */
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #A3B5A8; /* Muted teal */
        }
        .form-control {
            background: #F5F5E8; /* Light cream */
            border: 1px solid #A3B5A8; /* Muted teal */
            border-left: none;
            border-radius: 0 8px 8px 0;
            padding: 12px;
            font-size: 16px;
            color: #1A3C34;
        }
        .form-control:focus {
            border-color: #D4A017; /* Soft gold */
            box-shadow: 0 0 5px rgba(212, 160, 23, 0.5);
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #A3B5A8; /* Muted teal */
            cursor: pointer;
        }
        .toggle-password:hover {
            color: #D4A017; /* Soft gold */
        }
        .btn-primary {
            background: #D4A017; /* Soft gold */
            border: none;
            color: #1A3C34; /* Deep teal */
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 500;
            width: 100%;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .btn-primary:hover {
            background: #1A3C34; /* Deep teal */
            color: #F5F5E8; /* Light cream */
        }
        .form-check-input {
            border: 1px solid #A3B5A8; /* Muted teal */
            width: 16px;
            height: 16px;
        }
        .form-check-input:checked {
            background-color: #D4A017; /* Soft gold */
            border-color: #D4A017;
        }
        .form-check-label {
            color: #1A3C34; /* Deep teal */
            margin-left: 8px;
        }
        a.text-primary {
            color: #D4A017; /* Soft gold */
            text-decoration: none;
        }
        a.text-primary:hover {
            color: #1A3C34; /* Deep teal */
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .signup-card {
                max-width: 300px;
                padding: 20px;
            }
            .hero {
                height: 40vh;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn-outline-primary {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Join JoyRide</h1>
            <p>Rent a car or share yours today</p>
            
        </div>
        <div class="breadcrumbs">
            <a href="{% url 'index' %}">Home</a>
            <span>></span>
            <span>Sign Up</span>
        </div>
    </section>

    <!-- Main Content -->
    <section class="ftco-section" id="signup-form">
        <div class="container">
            {% if msg %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <div class="signup-card">
                <h3>Sign Up</h3>
                <form method="post" action="{% url 'signup' %}" class="needs-validation" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    <div class="mb-4 text-center">
                        <div class="btn-group" role="group">
                            <input type="radio" class="btn-check" name="usertype" id="customer" value="customer" required>
                            <label class="btn btn-outline-primary" for="customer">Customer (Rent)</label>
                            <input type="radio" class="btn-check" name="usertype" id="lessor" value="lessor" required>
                            <label class="btn btn-outline-primary" for="lessor">Lessor (List)</label>
                        </div>
                        <small class="text-muted d-block mt-1">Choose your role</small>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-mobile-alt"></i></span>
                            <input type="tel" class="form-control" id="mobile" name="mobile" placeholder="Mobile" pattern="[0-9]{10}" required>
                        </div>
                    </div>
                    <div class="mb-3 position-relative">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" minlength="8" required>
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-4 position-relative">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="cpassword" name="cpassword" placeholder="Confirm Password" minlength="8" required>
                            <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-camera"></i></span>
                            <input type="file" class="form-control" id="profile" name="profile" accept="image/*">
                        </div>
                        <small class="text-muted">Optional</small>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">I agree to <a href="#" class="text-primary">Terms</a></label>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                    <p class="text-center mt-3 mb-0">Have an account? <a href="{% url 'login' %}" class="text-primary">Log In</a></p>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Form validation
        const form = document.querySelector('.needs-validation');
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');

            const password = document.getElementById('password');
            const cpassword = document.getElementById('cpassword');
            if (password.value !== cpassword.value) {
                event.preventDefault();
                cpassword.setCustomValidity('Passwords do not match');
                cpassword.classList.add('is-invalid');
            } else {
                cpassword.setCustomValidity('');
                cpassword.classList.remove('is-invalid');
            }

            const usertype = document.querySelector('input[name="usertype"]:checked');
            if (!usertype) {
                event.preventDefault();
                form.classList.add('was-validated');
            }
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        // Smooth scroll
        document.querySelector('.hero .btn-primary').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('#signup-form').scrollIntoView({ behavior: 'smooth' });
        });
    });
    </script>
</body>
</html>
{% endblock %}
