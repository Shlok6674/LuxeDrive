{% extends 'header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #F5F5E8; /* Light cream */
            color: #1A3C34; /* Deep teal */
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            background-image: url('{% static 'images/bg_3.jpg' %}');
            background-size: cover;
            background-position: center;
        }
        .hero .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Adjusted overlay for contrast */
            z-index: 0;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            color: #D4A017; /* Soft gold */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* Breadcrumbs */
        .breadcrumbs {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 20px;
            z-index: 2;
        }
        .breadcrumbs a {
            color: #F5F5E8; /* Light cream */
            text-decoration: none;
            font-size: 16px;
            margin: 0 5px;
            font-family: 'Montserrat', sans-serif;
        }
        .breadcrumbs a:hover {
            color: #D4A017; /* Soft gold */
        }
        .breadcrumbs span {
            color: #A3B5A8; /* Muted teal */
            font-size: 16px;
            margin: 0 5px;
        }

        /* Main Content */
        .ftco-section {
            padding: 100px 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Alerts */
        .alert {
            background: #E8ECE5; /* Slightly darker cream */
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            color: #1A3C34; /* Deep teal */
            border: 1px solid #A3B5A8; /* Muted teal */
        }
        .alert-danger {
            background: #D4A017; /* Soft gold */
            color: #1A3C34;
        }

        /* Change Password Form */
        .card {
            background: #E8ECE5; /* Slightly darker cream */
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(26, 60, 52, 0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: #1A3C34; /* Deep teal */
            margin-bottom: 8px;
        }
        .form-control {
            background: #F5F5E8; /* Light cream */
            border: 1px solid #A3B5A8; /* Muted teal */
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            color: #1A3C34;
        }
        .form-control:focus {
            border-color: #D4A017; /* Soft gold */
            box-shadow: 0 0 5px rgba(212, 160, 23, 0.5);
        }
        .btn-primary {
            background: #D4A017; /* Soft gold */
            border: none;
            color: #1A3C34; /* Deep teal */
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 500;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .btn-primary:hover {
            background: #1A3C34; /* Deep teal */
            color: #F5F5E8; /* Light cream */
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Change Password</h1>
        </div>
        <div class="breadcrumbs">
            <a href="{% url 'index' %}">Home</a>
            <span>></span>
            <span>Change Password</span>
        </div>
    </section>

    <!-- Main Content -->
    <section class="ftco-section">
        <div class="container">
            {% if msg %}
            <div class="alert alert-danger" role="alert">
                {{ msg }}
            </div>
            {% endif %}

            <div class="card">
                <form method="post" action="{% url 'cpass' %}" class="contact-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="opassword" class="form-label">Old Password</label>
                        <input type="password" class="form-control" id="opassword" placeholder="Your Old Password" name="opassword" required>
                    </div>
                    <div class="form-group">
                        <label for="npassword" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="npassword" placeholder="Your New Password" name="npassword" required>
                    </div>
                    <div class="form-group">
                        <label for="cnpassword" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="cnpassword" placeholder="Your Confirm New Password" name="cnpassword" required>
                    </div>
                    <div class="form-group">
                        <input type="submit" value="Update Password" class="btn btn-primary">
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
{% endblock %}
